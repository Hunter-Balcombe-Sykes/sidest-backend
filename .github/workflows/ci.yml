name: CI

on:
  pull_request:
    branches: [main, development-v2]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_sqlite, sqlite3, redis
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Security audit
        run: composer audit

      - name: Copy env
        run: cp .env.example .env && php artisan key:generate

      - name: Check code style
        run: vendor/bin/pint --test

      - name: Check for inline auth bypasses in controllers
        run: |
          # Direct BrandAccessService capability calls in controllers bypass Policies — use authorizeForUser() via a Policy instead.
          # Add new capability methods to this pattern as they're introduced.
          CAPABILITY_PATTERN="canManageShopify|canManageBrand|canReadBrandAnalytics|canReadBrandFinancialAnalytics"
          CAPABILITY_BYPASS=$(grep -rEn "$CAPABILITY_PATTERN" app/Http/Controllers/ | wc -l | tr -d ' ')
          # Inline 403 aborts in controllers bypass the Policy layer — use authorizeForUser() instead.
          # Pattern catches abort(403, ...), abort_unless(..., 403, ...), abort_if(..., 403, ...).
          # If the abort is actually input validation (stale IDs etc.), use abort(422, ...) — see the bulk-id reorder pattern in ProfessionalServiceController for precedent.
          INLINE_403=$(grep -rE "abort\(403|abort_unless|abort_if" app/Http/Controllers/ | grep "403" | wc -l | tr -d ' ')

          if [ "$CAPABILITY_BYPASS" -gt 0 ]; then
            echo "::error::Found $CAPABILITY_BYPASS direct BrandAccessService capability call(s) in controllers. Route authorization through a Policy via authorizeForUser() instead."
            grep -rEn "$CAPABILITY_PATTERN" app/Http/Controllers/
            exit 1
          fi

          if [ "$INLINE_403" -gt 0 ]; then
            echo "::error::Found $INLINE_403 inline 403 abort(s) in controllers. Use a Policy via authorizeForUser() for authorization, or abort(422, ...) if it's really input validation."
            grep -rEn "abort\(403|abort_unless|abort_if" app/Http/Controllers/ | grep "403"
            exit 1
          fi

          echo "No inline auth bypasses found."

      - name: No raw Cache::* calls outside cache services (GS-1)
        run: |
          # GS-1: Cache keys must flow through CacheKeyGenerator and a *CacheService
          # to preserve tenant-prefix discipline. A rogue Cache::put('user_count', $n)
          # in a controller is one git push away from a cross-tenant data leak — this
          # lint blocks that class of bug before it reaches review.
          #
          # Allowlisted by path:
          #   - app/Services/Cache/                  — the canonical cache layer itself
          #   - app/Http/Controllers/Api/Webhooks/   — Cache::add() for idempotency dedupe
          #   - pre-existing legitimate callers      — file-level entries below.
          # New code MUST route through a cache service. To add a new exception,
          # justify it in PR review and append the path here.
          set +e
          BAD=$(git grep -n -E '\bCache::(put|remember|rememberForever|forget|add)\b' -- \
            'app/' \
            ':!app/Services/Cache/' \
            ':!app/Http/Controllers/Api/Webhooks/' \
            ':!app/Http/Controllers/Api/HealthController.php' \
            ':!app/Http/Controllers/Api/Professional/ShopifyEmbeddedConnectionController.php' \
            ':!app/Http/Controllers/Api/Professional/Notifications/NotificationController.php' \
            ':!app/Http/Controllers/Api/Professional/Store/BrandStoreSettingsController.php' \
            ':!app/Http/Controllers/Api/PublicSite/PublicShopifyStorefrontController.php' \
            ':!app/Jobs/Shopify/ProcessShopifyShopUpdateJob.php' \
            ':!app/Observers/Core/BrandProfileObserver.php' \
            ':!app/Observers/Core/CustomerObserver.php' \
            ':!app/Observers/Retail/BrandStoreSettingsObserver.php' \
            ':!app/Services/Professional/BrandStatusService.php' \
            ':!app/Services/Shopify/ShopifySetupTokenService.php' \
            ':!app/Services/Store/BrandCatalogService.php' \
            ':!app/Services/Stripe/CommissionPayoutRefundService.php' \
            ':!app/Services/Stripe/StripeConnectService.php')
          set -e
          if [ -n "$BAD" ]; then
            echo "::error::Found raw Cache::(put|remember|rememberForever|forget|add) call(s) outside the cache-services allowlist."
            echo "$BAD"
            echo ""
            echo "Use a method on a *CacheService (or CacheLockService::rememberLocked) with CacheKeyGenerator for key construction."
            echo "If this is a legitimate exception (webhook idempotency, internal token cache), add the file path to the allowlist in .github/workflows/ci.yml."
            exit 1
          fi
          echo "No raw Cache:: calls outside the GS-1 allowlist."

      - name: Run tests
        run: composer test
