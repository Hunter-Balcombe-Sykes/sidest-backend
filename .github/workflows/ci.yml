name: CI

on:
  pull_request:
    branches: [main, development-v2]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_sqlite, sqlite3, redis
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy env
        run: cp .env.example .env && php artisan key:generate

      - name: Check code style
        run: php artisan pint --test

      - name: Check for inline auth bypasses in controllers
        run: |
          # Direct canManageShopify calls in controllers bypass IntegrationPolicy — use authorizeForUser() instead.
          MANAGE_SHOPIFY=$(grep -rn "canManageShopify" app/Http/Controllers/ | wc -l | tr -d ' ')
          # Inline 403 aborts in controllers bypass the Policy layer — use authorizeForUser() instead.
          INLINE_403=$(grep -rE "abort_unless|abort_if" app/Http/Controllers/ | grep "403" | wc -l | tr -d ' ')

          if [ "$MANAGE_SHOPIFY" -gt 0 ]; then
            echo "::error::Found $MANAGE_SHOPIFY direct canManageShopify() call(s) in controllers. Route authorization through IntegrationPolicy via authorizeForUser() instead."
            grep -rn "canManageShopify" app/Http/Controllers/
            exit 1
          fi

          if [ "$INLINE_403" -gt 0 ]; then
            echo "::error::Found $INLINE_403 inline 403 abort(s) in controllers. Use a Policy via authorizeForUser() instead."
            grep -rE "abort_unless|abort_if" app/Http/Controllers/ | grep "403"
            exit 1
          fi

          echo "No inline auth bypasses found."

      - name: Run tests
        run: composer test
